stderr_logfile=/var/log/optscale/ngui.log
environment=UI_BUILD_PATH="/usr/src/app/ui",
    PROXY_URL="http://127.0.0.1:80",
    AUTH_ENDPOINT="http://127.0.0.1:8905",
    RESTAPI_ENDPOINT="http://127.0.0.1:8999",
    KEEPER_ENDPOINT="http://127.0.0.1:8973",
    SLACKER_ENDPOINT="http://127.0.0.1:8960",
    VITE_GOOGLE_OAUTH_CLIENT_ID="",
