[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
loglevel=warn
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/optscale

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

# ============================================================================
# INFRASTRUCTURE — priority 5, start first
# ============================================================================

[program:etcd]
command=etcd
    --enable-v2=true
    --listen-client-urls=http://0.0.0.0:2379
    --advertise-client-urls=http://0.0.0.0:2379
    --data-dir=/default.etcd
    --log-level=warn
priority=5
autorestart=true
startretries=10
startsecs=3
stdout_logfile=/var/log/optscale/etcd.log
stderr_logfile=/var/log/optscale/etcd.log
environment=ETCD_HEARTBEAT_INTERVAL="500",ETCD_ELECTION_TIMEOUT="5000"

[program:mariadb]
command=/usr/sbin/mariadbd
    --user=mysql
    --datadir=/var/lib/mysql
    --max_connections=128
    --innodb_buffer_pool_size=128M
    --innodb_file_per_table=1
    --wait_timeout=28800
    --explicit_defaults_for_timestamp=1
priority=5
autorestart=true
startretries=10
startsecs=5
stdout_logfile=/var/log/optscale/mariadb.log
stderr_logfile=/var/log/optscale/mariadb.log

[program:mongod]
command=/usr/bin/mongod
    --replSet=mongo
    --auth
    --keyFile=/data/configdb/key.txt
    --bind_ip_all
    --dbpath=/data/db
    --port=27017
    --storageEngine=wiredTiger
    --wiredTigerCacheSizeGB=0.25
    --logappend
user=mongodb
priority=5
autorestart=true
startretries=10
startsecs=5
stdout_logfile=/var/log/optscale/mongod.log
stderr_logfile=/var/log/optscale/mongod.log

[program:redis]
command=/usr/bin/redis-server
    --save ""
    --maxmemory 64mb
    --maxmemory-policy allkeys-lru
    --loglevel warning
priority=5
autorestart=true
startretries=10
startsecs=2
stdout_logfile=/var/log/optscale/redis.log
stderr_logfile=/var/log/optscale/redis.log

[program:rabbitmq]
command=/usr/sbin/rabbitmq-server
priority=5
autorestart=true
startretries=10
startsecs=15
stdout_logfile=/var/log/optscale/rabbitmq.log
stderr_logfile=/var/log/optscale/rabbitmq.log
environment=HOME="/var/lib/rabbitmq",RABBITMQ_NODENAME="rabbit@localhost",RABBITMQ_ERLANG_COOKIE="dWkhXehOApH1OHshvByfpfTf3Cd8wwkADei7mWd5JF"

[program:clickhouse]
command=/usr/bin/clickhouse-server --config-file=/etc/clickhouse-server/config.xml
user=clickhouse
priority=5
autorestart=true
startretries=10
startsecs=10
stdout_logfile=/var/log/optscale/clickhouse.log
stderr_logfile=/var/log/optscale/clickhouse.log

[program:influxdb]
command=/usr/bin/influxd -config /etc/influxdb/influxdb.conf
priority=5
autorestart=true
startretries=10
startsecs=5
stdout_logfile=/var/log/optscale/influxdb.log
stderr_logfile=/var/log/optscale/influxdb.log

[program:minio]
command=minio server /opt/minio-data --address :9000
priority=5
autorestart=true
startretries=10
startsecs=3
stdout_logfile=/var/log/optscale/minio.log
stderr_logfile=/var/log/optscale/minio.log
environment=MINIO_ACCESS_KEY="optscale-minio",MINIO_SECRET_KEY="secret_password"

# ============================================================================
# CONFIGURATOR — one-shot, runs after infra is healthy (priority 50)
# Has internal retry logic (300 attempts × 500ms) so it waits for DBs.
# ============================================================================

[program:configurator]
command=python3 /usr/src/app/docker_images/configurator/configurator.py /config/etcd-config
directory=/usr/src/app
priority=50
autorestart=false
startretries=0
startsecs=3
exitcodes=0
stdout_logfile=/var/log/optscale/configurator.log
stderr_logfile=/var/log/optscale/configurator.log
environment=HX_ETCD_HOST="127.0.0.1",HX_ETCD_PORT="2379",PYTHONPATH="/usr/src/app"

