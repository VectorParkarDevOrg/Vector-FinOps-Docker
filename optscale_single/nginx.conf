events {
    worker_connections 512;
}

http {
    client_max_body_size 512m;
    proxy_read_timeout    600;
    proxy_send_timeout    600;
    proxy_connect_timeout 10;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_http_version 1.1;

    # Retry on 502/504 so services have time to start
    proxy_next_upstream error timeout http_502 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 30s;

    server {
        listen 80;

        location /auth {
            proxy_pass http://127.0.0.1:8905;
        }

        location /restapi {
            proxy_pass http://127.0.0.1:8999;
        }

        location /report {
            proxy_pass http://127.0.0.1:8973;
        }

        location /herald {
            proxy_pass http://127.0.0.1:8906;
        }

        location /katara {
            proxy_pass http://127.0.0.1:8935;
        }

        location /insider {
            proxy_pass http://127.0.0.1:8945;
        }

        location /slacker {
            proxy_pass http://127.0.0.1:8960;
        }

        location /metroculus {
            proxy_pass http://127.0.0.1:8969;
        }

        location /jira_bus {
            proxy_pass http://127.0.0.1:8977;
        }

        location /jira_ui {
            proxy_pass http://127.0.0.1:4001;
        }

        # diproxy: changed to 8936 to avoid conflict with katara (8935)
        location /storage {
            proxy_pass http://127.0.0.1:8936;
        }

        # Main frontend — catch-all to ngui
        location / {
            proxy_pass http://127.0.0.1:4000;
        }
    }
}
