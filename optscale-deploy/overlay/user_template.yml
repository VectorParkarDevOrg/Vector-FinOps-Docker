# Public ip of OptScale VM used in external integrations like emails,
# google calendar etc. Defaults to internal ip, change it if internal ip
# is not accessible in your network
#
# Public ip must be set to the fully qualified domain name of your OptScale instance
# if you want to use cert-manager to manage the SSL certificate lifecycle.
#
# eg:
#  public_ip: optscale.example.com
#
public_ip:

ssl:
  # set to false to not force ssl redirect on k8s ingress
  force_redirect: true
  # set to the name of your k8s secret which store the certificate
  certificate_name: defaultcert
  cert_manager:
    # enable the cert-manager integration
    enabled: false
    # specify the name and the type of the issuer (issuer, cluster-issuer)
    issuer:
    issuer_type: issuer

# Email verification is disabled by default. Set the flag to `False` to enable it
disable_email_verification: True

# settings for password strength policy
password_strength_settings:
  min_length:
  min_lowercase:
  min_uppercase:
  min_digits:
  min_special_chars:

exchange_rates:
  BRL:
  INR:
  EUR:

stripe:
  enabled: false
  api_key:
  webhook_secret:

# ---- Memory tuning for sub-8GB deployment ----

# Thanos Receive: reduce from 8192MB default to 1024MB
# This is the single biggest limiter — original value was 8GB cap
thanos_receive:
  memory_limit: 1024
  cpu_limit: 1

# MongoDB: reduce WiredTiger cache from 1.0GB to 256MB
mongo:
  cache_size: 0.25

# RabbitMQ: reduce memory limit from 512MB to 256MB
rabbitmq:
  memory_limit: 256

# Herald: reduce engine replicas from 2 to 1
# Email sending does not require 2 workers for low-volume usage
herald:
  engine:
    replicaCount: 1

# Resource discovery: reduce from 2 workers to 1
# Only needs 2+ if you have many cloud accounts running parallel imports
resource_discovery:
  replicaCount: 1
  memory_limit: 512

# Booking observer: reduce from 2 workers to 1
booking_observer:
  replicaCount: 1

# ClickHouse: add Kubernetes resource limits and reduce in-memory caches
# Original cache config was 8GB uncompressed + 5GB mark cache (hardcoded)
clickhouse:
  uncompressed_cache_size: 536870912   # 512MB (was 8GB)
  mark_cache_size: 268435456           # 256MB (was 5GB)
  resources:
    requests:
      cpu: "0.25"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
