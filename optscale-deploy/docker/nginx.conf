events {
    worker_connections 1024;
}

http {
    client_max_body_size 512m;
    proxy_read_timeout    600;
    proxy_send_timeout    600;
    proxy_connect_timeout 10;

    # Pass real host/IP to backends
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_http_version 1.1;

    server {
        listen 80;

        # Auth service
        location /auth {
            proxy_pass http://auth:8905;
        }

        # REST API
        location /restapi {
            proxy_pass http://restapi:8999;
        }

        # Keeper (reports)
        location /report {
            proxy_pass http://keeper:8973;
        }

        # Herald
        location /herald {
            proxy_pass http://heraldapi:8906;
        }

        # Katara
        location /katara {
            proxy_pass http://kataraapi:8935;
        }

        # Insider (cloud pricing)
        location /insider {
            proxy_pass http://insider-api:8945;
        }

        # Slacker (Slack integration)
        location /slacker {
            proxy_pass http://slacker:80;
        }

        # Metroculus
        location /metroculus {
            proxy_pass http://metroculusapi:8969;
        }

        # Jira Bus
        location /jira_bus {
            proxy_pass http://jira-bus:8977;
        }

        # Jira UI
        location /jira_ui {
            proxy_pass http://jira-ui:4000;
        }

        # DiProxy (data import storage)
        location /storage {
            proxy_pass http://diproxy:8935;
        }

        # Frontend — catch-all to ngui
        location / {
            proxy_pass http://ngui:4000;
        }
    }
}
