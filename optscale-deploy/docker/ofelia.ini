# Report import triggers — curl calls into restapi
[job-run "report-import-15m"]
schedule    = 0 */15 * * * *
image       = curlimages/curl:latest
network     = optscale
command     = -sf http://restapi:8999/restapi/v4/cloud_accounts/report_import -X POST
delete      = true

[job-run "report-import-1h"]
schedule    = 0 0 * * * *
image       = curlimages/curl:latest
network     = optscale
command     = -sf http://restapi:8999/restapi/v4/cloud_accounts/report_import?period=1 -X POST
delete      = true

[job-run "report-import-6h"]
schedule    = 0 0 */6 * * *
image       = curlimages/curl:latest
network     = optscale
command     = -sf http://restapi:8999/restapi/v4/cloud_accounts/report_import?period=6 -X POST
delete      = true

[job-run "report-import-24h"]
schedule    = 0 0 0 * * *
image       = curlimages/curl:latest
network     = optscale
command     = -sf http://restapi:8999/restapi/v4/cloud_accounts/report_import?period=24 -X POST
delete      = true
