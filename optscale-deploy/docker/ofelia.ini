# Ofelia cron scheduler — replaces Kubernetes CronJobs for Docker Compose deployments.
# All job-run containers join the "optscale" network so they can reach etcd/mariadb/etc.
# Adjust schedules to match K8s originals if needed.

[job-run "cleanmongodb"]
schedule    = @every 3m
image       = cleanmongodb:local
network     = optscale
environment = ["HX_ETCD_HOST=etcd-client", "HX_ETCD_PORT=2379"]
delete      = true

[job-run "cleaninfluxdb"]
schedule    = @weekly
image       = cleaninfluxdb:local
network     = optscale
environment = ["HX_ETCD_HOST=etcd-client", "HX_ETCD_PORT=2379"]
delete      = true

